spring.application.name=backend
spring.docker.compose.enabled=false


spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.liquibase.default-schema=public

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5433/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres7ygv8uhb

spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation= true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

jwt.secret=mySuperSecretKeyForJWTTokenGenerationAndValidation2024WithAtLeast32Characters
jwt.expiration=86400000


spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.trusted.packages=ru.samoylov.backend.dto
spring.kafka.producer.properties.spring.json.type.mapping=emailTask:ru.samoylov.backend.dto.EmailTask
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
